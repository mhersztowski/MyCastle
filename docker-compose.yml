services:
  backend:
    build:
      context: .
      dockerfile: app/mycastle-backend/Dockerfile
    environment:
      - PORT=1894
      - ROOT_DIR=/data
      - STATIC_DIR=/app/app/mycastle-web/build
    ports:
      - "1894:1894"
    volumes:
      - mycastle-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:1894/ocr/status').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mycastle-data:
