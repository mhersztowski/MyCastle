services:
  minis:
    build:
      context: .
      dockerfile: app/minis-backend/Dockerfile
    environment:
      - PORT=1902
      - ROOT_DIR=/data
      - STATIC_DIR=/app/static
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
    volumes:
      - minis-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:1902/api/auth/users').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  minis-data:
