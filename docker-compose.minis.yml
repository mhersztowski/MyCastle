services:
  minis:
    build:
      context: .
      dockerfile: app/minis-backend/Dockerfile
    environment:
      - PORT=1902
      - ROOT_DIR=/data
      - STATIC_DIR=/app/app/minis-web/build
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
    ports:
      - "1902:1902"
    volumes:
      - /opt/mycastle-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:1902/api/auth/users').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
